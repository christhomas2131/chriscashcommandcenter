services:
  # ── Streamlit web app ────────────────────────────────────────────────────────
  - type: web
    name: job-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: SEED_ON_STARTUP
        value: "false"
      - key: JSEARCH_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

  # ── Ingestion cron job (daily at 7 AM UTC) ───────────────────────────────────
  - type: cron
    name: job-ingestion
    runtime: python
    schedule: "0 7 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingestion.run_ingestion
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: JSEARCH_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

databases:
  - name: job-tracker-db
    databaseName: job_tracker
    plan: free
